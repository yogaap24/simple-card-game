name: Deploy Card BISINDO (Staging)

on:
  push:
    branches:
      - master
      - main
    paths-ignore:
      - 'README.md'
      - 'GUIDE.md'
      - '**.md'

  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/card-bisindo:latest
          build-args: |
            VITE_SERVER_URL=https://card-bisindo.yoo.ga
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/card-bisindo:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/card-bisindo:buildcache,mode=max

  deploy-vps:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Create Directory on VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.KEY }}
          script: |
            mkdir -p /root/workspace/card-bisindo

      - name: Copy Config to VPS
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.KEY }}
          source: "docker-compose.yml"
          target: "/root/workspace/card-bisindo"
          rm: false

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.KEY }}
          script: |
            cd /root/workspace/card-bisindo

            # Pull latest image
            docker-compose pull app

            # Recreate and restart containers (.env sudah ada di folder ini)
            docker-compose up -d --force-recreate app

            # Clean up old images
            docker image prune -f

            echo "✅ Card BISINDO deployed successfully!"

